services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: operatoros-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operatoros-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: operatoros-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: operatoros
      POSTGRES_PASSWORD: operatoros
      POSTGRES_DB: operatoros
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operatoros -d operatoros"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - operatoros-net

  redis:
    image: redis:7-alpine
    container_name: operatoros-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - operatoros-net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: operatoros-celery-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operatoros-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: operatoros-celery-beat
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operatoros-net

  n8n:
    image: n8nio/n8n:latest
    container_name: operatoros-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=operatoros
      - DB_POSTGRESDB_USER=operatoros
      - DB_POSTGRESDB_PASSWORD=operatoros
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n:5678}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operatoros-net

volumes:
  postgres_data:
    name: operatoros_postgres_data
  redis_data:
    name: operatoros_redis_data
  n8n_data:
    name: operatoros_n8n_data

networks:
  operatoros-net:
    name: operatoros-net
    driver: bridge
