[alembic]
# path to migration environment
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# truncate long revision identifiers in filenames
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
revision_environment = false

# set to 'true' to allow .hierarchyrevision files in the migration environment
# This is required for branch labels to work properly
# sourceless = false

# timezone to use for the revision timestamp (empty string uses localtime)
timezone = UTC

# version location specification; must point to a directory
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; default is OS pathsep
# version_path_separator = :

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Connection string is set programmatically in env.py from app settings
# sqlalchemy.url is intentionally left blank
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
